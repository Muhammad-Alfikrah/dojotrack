<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login DojoTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">

  <div class="login-left">
    <div class="login-brand">
      DOJO<span>TRACK</span>
    </div>

    <!-- Fighter SVG -->
    <svg id="login-fighter" width="200" height="320" viewBox="0 0 200 320">
      <g fill="#e63946">
        <circle cx="100" cy="40" r="24"/>
        <rect x="82" y="64" width="36" height="90" rx="8"/>
        <!-- punch arm -->
        <line x1="118" y1="90" x2="185" y2="75" stroke="#e63946" stroke-width="14" stroke-linecap="round"/>
        <!-- guard arm -->
        <line x1="82" y1="95" x2="45" y2="125" stroke="#e63946" stroke-width="14" stroke-linecap="round"/>
        <!-- front leg kick -->
        <line x1="108" y1="154" x2="145" y2="210" stroke="#e63946" stroke-width="16" stroke-linecap="round"/>
        <line x1="145" y1="210" x2="185" y2="155" stroke="#e63946" stroke-width="16" stroke-linecap="round"/>
        <!-- back leg -->
        <line x1="90" y1="154" x2="60" y2="270" stroke="#e63946" stroke-width="16" stroke-linecap="round"/>
        <ellipse cx="185" cy="151" rx="20" ry="8"/>
        <ellipse cx="60" cy="275" rx="20" ry="8"/>
      </g>
    </svg>

    <p class="login-tagline">Sistem Manajemen<br>Dojo Karate</p>
  </div>

  <div class="login-right">
    <div class="login-box">
      <div class="red-line" style="margin:0 0 1.5rem 0"></div>
      <h1 class="login-title">MASUK</h1>
      <p class="login-sub">Masukkan kredensial admin kamu</p>

      <div id="login-error" class="login-error" style="display:none"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="admin@dojotrack.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="login-btn" id="login-btn" onclick="handleLogin()">
        MASUK
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
