<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi DojoTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/members.css">
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-logo">DOJO<span>TRACK</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"></span><span>Dashboard</span>
      </a>
      <a href="members.html" class="nav-item">
        <span class="nav-icon"></span><span>Member</span>
      </a>
      <a href="attendance.html" class="nav-item active">
        <span class="nav-icon"></span><span>Absensi</span>
      </a>
      <a href="payments.html" class="nav-item">
        <span class="nav-icon"></span><span>Iuran</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Keluar</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="dash-header">
      <div>
        <p class="dash-greeting">Catat kehadiran latihan</p>
        <h1 class="dash-title">ABSENSI</h1>
      </div>
      <button class="cta-btn" onclick="openModal()">+ Catat Absensi</button>
    </header>

    <!-- Filter -->
    <div class="filter-bar">
      <input type="date" class="form-input" id="filter-date" onchange="loadAttendance()"/>
      <select class="form-input filter-select" id="filter-member" onchange="loadAttendance()">
        <option value="">Semua Member</option>
      </select>
    </div>

    <!-- Rekap bulan ini -->
    <div class="dash-section">
      <div class="dash-section-header">
        <h2 class="dash-section-title">REKAP BULAN INI</h2>
      </div>
      <div class="stats-grid" id="rekap-grid" style="margin-bottom:0">
      </div>
    </div>

    <!-- Tabel absensi -->
    <div class="dash-section">
      <div class="dash-section-header">
        <h2 class="dash-section-title">RIWAYAT ABSENSI</h2>
      </div>
      <div class="table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Member</th>
              <th>Tanggal</th>
              <th>Jadwal</th>
              <th>Status</th>
              <th>Catatan</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody">
            <tr><td colspan="5" class="table-loading">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Catat Absensi -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title">CATAT ABSENSI</h2>
      <button class="modal-close" onclick="closeModal()">x</button>
    </div>
    <div class="modal-body">
      <div id="modal-error" class="login-error" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Member *</label>
        <select class="form-input" id="a-member"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Tanggal *</label>
        <input type="date" class="form-input" id="a-date"/>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="a-status">
          <option value="true">Hadir</option>
          <option value="false">Tidak Hadir</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Catatan</label>
        <input type="text" class="form-input" id="a-notes" placeholder="Opsional"/>
      </div>
      <button class="login-btn" onclick="submitAttendance()">SIMPAN ABSENSI</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/attendance.js"></script>
</body>
</html>
