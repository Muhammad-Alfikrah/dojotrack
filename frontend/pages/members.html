<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member DojoTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/members.css">
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-logo">DOJO<span>TRACK</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"></span><span>Dashboard</span>
      </a>
      <a href="members.html" class="nav-item active">
        <span class="nav-icon"></span><span>Member</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <span class="nav-icon"></span><span>Absensi</span>
      </a>
      <a href="payments.html" class="nav-item">
        <span class="nav-icon"></span><span>Iuran</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Keluar</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="dash-header">
      <div>
        <p class="dash-greeting">Kelola anggota dojo</p>
        <h1 class="dash-title">MEMBER</h1>
      </div>
      <button class="cta-btn" onclick="openModal()">+ Tambah Member</button>
    </header>

    <!-- Filter -->
    <div class="filter-bar">
      <input
        type="text"
        class="form-input filter-search"
        placeholder="Cari nama member..."
        id="search-input"
        oninput="filterMembers()"
      />
      <select class="form-input filter-select" id="belt-filter" onchange="filterMembers()">
        <option value="">Semua Sabuk</option>
        <option value="putih">Putih</option>
        <option value="kuning">Kuning</option>
        <option value="hijau">Hijau</option>
        <option value="biru">Biru</option>
        <option value="coklat">Coklat</option>
        <option value="hitam_1">Hitam 1</option>
        <option value="hitam_2">Hitam 2</option>
        <option value="hitam_3">Hitam 3</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="dash-table">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Email</th>
            <th>Telepon</th>
            <th>Sabuk</th>
            <th>Bergabung</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="member-tbody">
          <tr><td colspan="7" class="table-loading">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal Tambah Member -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title">TAMBAH MEMBER</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-error" class="login-error" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Nama Lengkap *</label>
        <input type="text" class="form-input" id="m-name" placeholder="Budi Santoso"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="m-email" placeholder="budi@email.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Telepon</label>
          <input type="text" class="form-input" id="m-phone" placeholder="081234567890"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sabuk</label>
          <select class="form-input" id="m-belt">
            <option value="putih">Putih</option>
            <option value="kuning">Kuning</option>
            <option value="hijau">Hijau</option>
            <option value="biru">Biru</option>
            <option value="coklat">Coklat</option>
            <option value="hitam_1">Hitam 1</option>
            <option value="hitam_2">Hitam 2</option>
            <option value="hitam_3">Hitam 3</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal Bergabung *</label>
          <input type="date" class="form-input" id="m-join"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Alamat</label>
        <input type="text" class="form-input" id="m-address" placeholder="Jl. Contoh No. 1"/>
      </div>
      <button class="login-btn" onclick="submitMember()">SIMPAN MEMBER</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/members.js"></script>
</body>
</html>
